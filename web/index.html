<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Asistencia en Blockchain</title>
</head>
<body>
  <h1>Registro de Asistencia a Eventos</h1>

  <button id="connectButton">Conectar MetaMask</button>

  <h2>Crear evento</h2>
  <input id="eventName" type="text" placeholder="Nombre del evento" />
  <button id="createButton">Crear evento</button>

  <h2>Gestionar asistencia</h2>
  <input id="eventId" type="number" placeholder="ID del evento" />
  <input id="attendeeAddress" type="text" placeholder="Dirección del asistente (opcional)" />

  <div>
    <button id="registerButton">Registrar asistencia</button>
    <button id="verifyButton">Verificar asistencia</button>
    <button id="closeButton">Cerrar evento</button>
  </div>

  <p id="status">Desconectado</p>
  <p id="result"></p>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
